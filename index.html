<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightRAG Tracking Status</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --border-color: #dee2e6;
            --primary: #0d6efd;
            --code-bg: #f1f3f5;
            --changed-bg: #fff3cd;
            --changed-text: #856404;
            --unchanged-bg: #d4edda;
            --unchanged-text: #155724;
            --pending-bg: #e2e3e5;
            --pending-text: #383d41;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            color: var(--text-main);
            font-weight: 600;
        }

        .refresh-notice {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--code-bg);
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .repo-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .repo-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
        }

        .repo-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .repo-title {
            margin: 0 0 4px 0;
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            word-break: break-all;
        }

        .path-text {
            font-size: 13px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .tag {
            background: #e2e3e5;
            color: #383d41;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid #d6d8db;
        }

        .metadata-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }

        .meta-value {
            font-family: SFMono-Regular, Consolas, Monaco, monospace;
        }

        .commit-message {
            grid-column: 1 / -1;
            background: var(--code-bg);
            padding: 12px;
            border-radius: 4px;
            border-left: 3px solid var(--text-muted);
            font-size: 13px;
            color: #495057;
        }
        
        .files-section {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            margin-top: 15px;
        }
        
        .files-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .files-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .files-table th, .files-table td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .files-table th {
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--code-bg);
        }
        
        .files-table td {
            font-family: SFMono-Regular, Consolas, Monaco, monospace;
        }

        .status-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-changed {
            background-color: var(--changed-bg);
            color: var(--changed-text);
        }

        .status-unchanged {
            background-color: var(--unchanged-bg);
            color: var(--unchanged-text);
        }

        .status-pending {
            background-color: var(--pending-bg);
            color: var(--pending-text);
        }

        .no-data {
            text-align: center;
            color: var(--text-muted);
            padding: 50px;
            background: var(--card-bg);
            border-radius: 6px;
            border: 1px dashed var(--border-color);
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Repository Tracking Monitor</h1>
        <div class="refresh-notice" id="runtime-notice">Live SQLite Client</div>
    </header>

    <div id="repo-container" class="repo-grid">
        <div class="no-data">Initializing WebAssembly SQLite Engine...</div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', initializeDatabase);

    function mapSqlResultsToObjects(res) {
        if (!res || res.length === 0) return [];
        const columns = res[0].columns;
        const values = res[0].values;
        return values.map(row => {
            let obj = {};
            columns.forEach((col, index) => {
                obj[col] = row[index];
            });
            return obj;
        });
    }

    function getFileExtension(filename) {
        const parts = filename.split('.');
        if (parts.length === 1 || (parts[0] === "" && parts.length === 2)) {
            return "none";
        }
        return parts.pop().toLowerCase();
    }

    async function initializeDatabase() {
        const container = document.getElementById('repo-container');
        
        try {
            const sqlPromise = initSqlJs({
                locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
            });
            
            const cacheBuster = new Date().getTime();
            const dataPromise = fetch(`./repo_sync_state.db?v=${cacheBuster}`).then(res => {
                if (!res.ok) throw new Error("Could not load repo_sync_state.db. Ensure it is served in the same directory.");
                return res.arrayBuffer();
            });

            const [SQL, buf] = await Promise.all([sqlPromise, dataPromise]);
            const db = new SQL.Database(new Uint8Array(buf));
            
            const repoResult = db.exec("SELECT * FROM repositories ORDER BY last_checked_at DESC");
            const repos = mapSqlResultsToObjects(repoResult);

            if (repos.length === 0) {
                container.innerHTML = '<div class="no-data">No repositories are currently tracked in the database.</div>';
                return;
            }

            let htmlOutput = '';

            for (const repo of repos) {
                // UPDATE: Added processed_text and last_processed_at to the SELECT query
                const fileResult = db.exec(`
                    SELECT file_path, status, processed_text, last_processed_at
                    FROM tracked_files 
                    WHERE repo_url = '${repo.repo_url.replace(/'/g, "''")}' 
                    ORDER BY file_path ASC
                `);
                const files = mapSqlResultsToObjects(fileResult);
                
                let filesTableHtml = '';
                if (files.length > 0) {
                    const fileRows = files.map(file => {
                        const extension = getFileExtension(file.file_path);
                        const statusClass = file.status === 'changed' ? 'status-changed' : 'status-unchanged';
                        
                        // UPDATE: Evaluate if the file has been processed by the LLM
                        const isProcessed = file.processed_text !== null && file.processed_text !== undefined;
                        const processedLabel = isProcessed ? 'Yes' : 'Pending';
                        const processedClass = isProcessed ? 'status-unchanged' : 'status-pending';
                        
                        // UPDATE: Format the timestamp or display a fallback
                        const lastProcessedTime = file.last_processed_at ? escapeHtml(file.last_processed_at) : 'Not Processed';

                        return `
                            <tr>
                                <td>${escapeHtml(extension)}</td>
                                <td style="word-break: break-all; font-size: 11px;">${escapeHtml(file.file_path)}</td>
                                <td><span class="status-badge ${statusClass}">${escapeHtml(file.status)}</span></td>
                                <td><span class="status-badge ${processedClass}">${processedLabel}</span></td>
                                <td style="font-size: 11px;">${lastProcessedTime}</td>
                            </tr>
                        `;
                    }).join('');

                    // UPDATE: Replaced 250px with 50vh for dynamic sizing
                    filesTableHtml = `
                        <div class="files-section">
                            <div class="files-title">Tracked Files Overview</div>
                            <div style="max-height: 50vh; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 4px;">
                                <table class="files-table">
                                    <thead style="position: sticky; top: 0; z-index: 1;">
                                        <tr>
                                            <th style="width: 10%;">Type</th>
                                            <th style="width: 40%;">Path</th>
                                            <th style="width: 15%;">Git Status</th>
                                            <th style="width: 10%;">Processed</th>
                                            <th style="width: 25%;">Last Processed</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${fileRows}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `;
                } else {
                    filesTableHtml = `<div class="files-section"><div class="no-data" style="padding: 15px;">No file records found for this repository.</div></div>`;
                }

                htmlOutput += `
                    <div class="repo-card">
                        <div class="repo-header">
                            <div>
                                <h2 class="repo-title">${escapeHtml(repo.repo_url)}</h2>
                                <span class="path-text">${escapeHtml(repo.local_path)}</span>
                            </div>
                            ${repo.latest_version_tag ? `<span class="tag">Tag: ${escapeHtml(repo.latest_version_tag)}</span>` : ''}
                        </div>
                        
                        <div class="metadata-row">
                            <div class="meta-item">
                                <span class="meta-label">Total Indexed</span>
                                <span class="meta-value">${parseInt(repo.file_count) || 0}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Last Synchronized</span>
                                <span class="meta-value">${escapeHtml(repo.last_checked_at)}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Head Commit</span>
                                <span class="meta-value">${escapeHtml(repo.latest_commit_hash ? repo.latest_commit_hash.substring(0, 7) : 'N/A')}</span>
                            </div>
                            
                            <div class="meta-item commit-message">
                                <span class="meta-label">Latest Commit Header</span>
                                <div style="margin-top: 4px; white-space: pre-wrap;">${escapeHtml(repo.latest_commit_message || 'No log details available.')}</div>
                            </div>
                        </div>
                        
                        ${filesTableHtml}
                    </div>
                `;
            }

            container.innerHTML = htmlOutput;
            db.close();

        } catch (error) {
            container.innerHTML = `
                <div class="no-data" style="border-color: #f5c2c7; background: #fff3cd; color: #664d03;">
                    <strong>Database Execution Error:</strong><br>
                    ${escapeHtml(error.message)}<br><br>
                    <small style="color: var(--text-muted)">
                        Ensure the file is served over HTTP/localhost and the SQLite library has network access.
                    </small>
                </div>`;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
</script>
</body>
</html>
